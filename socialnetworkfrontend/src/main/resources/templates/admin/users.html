<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{index :: meta}"></th:block>
    <title>Пользователи</title>
</head>

<body>

    <th:block th:replace="~{index :: header}"></th:block>
    <th:block th:replace="~{my_profile :: menu}"></th:block>

    <h1>Пользователи</h1>

    <table>
        <tr>
            <td>id</td>
            <td>username</td>
            <td>email</td>
            <td>first_name</td>
            <td>last_name</td>
            <td>birth_date</td>
            <td>role</td>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.firstName}"></td>
            <td th:text="${user.lastName}"></td>
            <td th:text="${user.birthDate}"></td>
            <td>
                <form style="border: 0; padding: 0; display: inline-block">
                    <input type="hidden" th:value="${user.id}">
                    <input th:value="${user.role}">
                    <button class="change">изменить</button>
                </form>
            </td>
        </tr>
    </table>

</body>

</html>
