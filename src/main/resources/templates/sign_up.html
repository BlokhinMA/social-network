<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{index :: meta}"></th:block>
    <title>Регистрация</title>
</head>

<body>

<th:block th:replace="~{index :: header}"></th:block>

<form class="center sign-form">

    <p class="sign-text">Регистрация</p>

    <label for="login">Логин</label><br>
    <input type="text" id="login" name="login" placeholder="Например, ivan_ivanov"><br>
    <br>
    <label for="email">E-mail</label><br>
    <input type="email" id="email" name="email" placeholder="Например, ivan_ivanov@gmail.com" required><br>
    <br>
    <label for="first-name">Имя</label><br>
    <input type="text" id="first-name" name="firstName" placeholder="Например, Иван" required><br>
    <br>
    <label for="last-name">Фамилия</label><br>
    <input type="text" id="last-name" name="lastName" placeholder="Например, Иванов" required><br>
    <br>
    <label for="birth-date">Дата рождения</label><br>
    <input type="date" id="birth-date" name="birthDate" required><br>
    <br>
    <label for="password">Пароль</label><br>
    <input type="password" id="password" name="password" required><br>
    <br>
    <label for="password-again">Пароль еще раз</label><br>
    <input type="password" id="password-again" required>
    <br>
    <br>

    <button>Зарегистрироваться</button>

    <p><a th:href="@{/sign_in}">Войти</a></p>

</form>

<script>

    const form = document.querySelector('form');

    form.addEventListener('submit', function (event) {

        event.preventDefault();

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        fetch('/api/users/register', {
            method: 'POST',
            headers: {
                'Content-type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => {
                if (response.ok) {
                    console.log('Данные успешно отправлены на сервер');
                } else {
                    console.error('Произошла ошибка при отправке данных');
                }
            });

    });

</script>

</body>

</html>
