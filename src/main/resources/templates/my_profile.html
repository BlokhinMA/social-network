<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{index :: meta}"></th:block>
    <title>Главная</title>
</head>

<body>

    <th:block th:replace="~{index :: header}"></th:block>

    <th:block th:fragment="menu">

        <header class="header">

            <div class="right">
                <span>Вы вошли под логином <i id="username"></i></span>
                <button id="logout-button">выйти</button>
            </div>

            <script th:src="@{/js/users/get_current_user.js}"></script>

            <script>

                const logoutButton = document.getElementById('logout-button');

                logoutButton.addEventListener('click', function () {

                    fetch('/api/users/logout', {
                        method: 'GET'
                    })
                        .then(response => {
                            if (response.ok)
                                window.location = '/';
                        })

                });

            </script>

            <p><a th:href="@{/my_profile}">Мой профиль</a></p>
            <p><a th:href="@{/my_friends}">Мои друзья</a></p>
            <p><a th:href="@{/my_albums}">Мои альбомы</a></p>
            <p><a th:href="@{/my_communities}">Мои сообщества</a></p>
